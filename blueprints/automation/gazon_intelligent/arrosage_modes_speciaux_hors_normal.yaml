blueprint:
  name: Gazon Intelligent - Arrosage intelligent (modes spéciaux hors Normal)
  description: >
    Automatise l'arrosage des modes spéciaux hors Normal.
    Le blueprint déclenche automatiquement toutes les 15 minutes et conserve un
    déclenchement manuel de secours.
    Il bloque volontairement l'arrosage en Traitement et en Hivernage.
  domain: automation
  input:
    mode_select:
      name: Mode du gazon
      selector:
        entity:
          domain: select
    sensor_plan_arrosage:
      name: Plan d'arrosage
      selector:
        entity:
          domain: sensor
    sensor_arrosage_recommande:
      name: Arrosage recommandé
      selector:
        entity:
          domain: binary_sensor
    sensor_fenetre_optimale:
      name: Fenêtre optimale
      selector:
        entity:
          domain: sensor
    sensor_dernier_arrosage_detecte:
      name: Dernier arrosage détecté (optionnel)
      default: ""
      selector:
        entity:
          domain: sensor
    sensor_pluie_stop:
      name: Blocage pluie (optionnel)
      default: ""
      selector:
        entity:
          domain: binary_sensor
    sensor_etp:
      name: ETP (optionnel)
      default: ""
      selector:
        entity:
          domain: sensor
    sensor_humidite:
      name: Humidité (optionnel)
      default: ""
      selector:
        entity:
          domain: sensor
    sensor_arrosage_apres_application_autorise:
      name: Arrosage après application autorisé (optionnel)
      default: ""
      selector:
        entity:
          domain: binary_sensor

mode: single

trigger:
  - platform: time_pattern
    minutes: "/15"
    id: auto
  - platform: event
    event_type: gazon_intelligent_manual_watering_requested
    id: manual

variables:
  mode_select_entity: !input mode_select
  plan_arrosage_entity: !input sensor_plan_arrosage
  arrosage_recommande_entity: !input sensor_arrosage_recommande
  fenetre_optimale_entity: !input sensor_fenetre_optimale
  dernier_arrosage_entity: !input sensor_dernier_arrosage_detecte
  application_autorise_entity: !input sensor_arrosage_apres_application_autorise
  pluie_stop_entity: !input sensor_pluie_stop
  sensor_etp_entity: !input sensor_etp
  sensor_humidite_entity: !input sensor_humidite
  trigger_id: "{{ trigger.id | default('') }}"
  trigger_is_manual: "{{ trigger_id == 'manual' }}"
  trigger_is_auto: "{{ trigger_id == 'auto' }}"

  mode_gazon_raw: "{{ states(mode_select_entity) }}"
  plan_raw: "{{ states(plan_arrosage_entity) }}"
  arrosage_recommande_raw: "{{ states(arrosage_recommande_entity) }}"
  fenetre_optimale_raw: "{{ states(fenetre_optimale_entity) }}"
  pluie_stop_raw: "{{ states(pluie_stop_entity) }}"
  application_autorise_raw: "{{ states(application_autorise_entity) }}"
  etp_raw: "{{ states(sensor_etp_entity) }}"
  hum_raw: "{{ states(sensor_humidite_entity) }}"

  mode_gazon: "{{ mode_gazon_raw }}"
  plan_objective_mm: "{{ state_attr(plan_arrosage_entity, 'objective_mm') | float(0) }}"
  plan_total_duration_min: "{{ state_attr(plan_arrosage_entity, 'total_duration_min') | float(0) }}"
  plan_zone_count: "{{ state_attr(plan_arrosage_entity, 'zone_count') | int(0) }}"
  plan_fractionation: "{{ state_attr(plan_arrosage_entity, 'fractionation') | default(false) | bool }}"
  plan_passages: "{{ state_attr(plan_arrosage_entity, 'passages') | int(1) }}"
  plan_pause_minutes: "{{ state_attr(plan_arrosage_entity, 'pause_between_passages_minutes') | int(0) }}"
  plan_zones: "{{ state_attr(plan_arrosage_entity, 'zones') or [] }}"
  current_minutes: "{{ now().hour * 60 + now().minute }}"
  window_start_minute: "{{ state_attr(fenetre_optimale_entity, 'watering_window_start_minute') | int(0) }}"
  window_end_minute: "{{ state_attr(fenetre_optimale_entity, 'watering_window_end_minute') | int(0) }}"
  evening_start_minute: "{{ state_attr(fenetre_optimale_entity, 'watering_evening_start_minute') | int(1080) }}"
  evening_end_minute: "{{ state_attr(fenetre_optimale_entity, 'watering_evening_end_minute') | int(1260) }}"
  watering_evening_allowed: "{{ state_attr(fenetre_optimale_entity, 'watering_evening_allowed') | default(false) | bool }}"
  last_detected_at: >-
    {{
      state_attr(dernier_arrosage_entity, 'detected_at')
      if dernier_arrosage_entity not in ['', none]
      else ''
    }}
  last_total_mm: >-
    {{
      state_attr(dernier_arrosage_entity, 'total_mm')
      | float(0)
      if dernier_arrosage_entity not in ['', none]
      else 0
    }}
  plan_passage_label: >-
    {% set passages = state_attr(plan_arrosage_entity, 'passages') | int(1) %}
    {% if passages <= 1 %}
      un passage unique
    {% else %}
      {{ passages }} passages séquentiels
    {% endif %}

  plan_zones_summary: >-
    {% set zones = state_attr(plan_arrosage_entity, 'zones') or [] %}
    {% if zones | count > 0 %}
      {% for zone in zones -%}
        {{ loop.index }}. {{ zone.zone }} - {{ zone.duration_seconds | int(0) }} s
        {% if not loop.last %} | {% endif %}
      {%- endfor %}
    {% else %}
      aucune zone exploitable
    {% endif %}

  today_str: "{{ now().date().isoformat() }}"
  fenetre_target_date: >-
    {{
      state_attr(fenetre_optimale_entity, 'watering_target_date')
      | default('', true)
      | string
    }}
  recent_watering_block: >-
    {% set detected_at = last_detected_at %}
    {% set recent = false %}
    {% if detected_at not in ['', none, 'unknown', 'unavailable'] %}
      {% set age_seconds = as_timestamp(now()) - as_timestamp(detected_at) %}
      {% set recent = age_seconds < 6 * 3600 %}
    {% endif %}
    {% set objective = plan_objective_mm | float(0) %}
    {% set last_total = last_total_mm | float(0) %}
    {% set detected_date = detected_at[:10] if detected_at not in ['', none, 'unknown', 'unavailable'] else '' %}
    {{ recent or (detected_date == today_str and objective > 0 and last_total >= objective) }}

  capteurs_ok: >
    {{
      mode_gazon_raw not in ['unknown', 'unavailable', 'none', '']
      and plan_raw not in ['unknown', 'unavailable', 'none', '']
      and arrosage_recommande_raw not in ['unknown', 'unavailable', 'none', '']
      and fenetre_optimale_raw not in ['unknown', 'unavailable', 'none', '']
      and (application_ok | bool)
    }}

  plan_ok: >
    {{
      (plan_objective_mm | float(0)) > 0
      and (plan_zone_count | int(0)) > 0
      and (plan_total_duration_min | float(0)) > 0
      and (plan_zones | count > 0)
      and (plan_passages | int(1)) > 0
    }}

  arrosage_ok: "{{ arrosage_recommande_raw == 'on' }}"

  pluie_stop: >-
    {{
      pluie_stop_entity not in ['', none]
      and pluie_stop_raw not in ['unknown', 'unavailable', 'none', '']
      and is_state(pluie_stop_entity, 'on')
    }}

  application_ok: >-
    {{
      application_autorise_entity in ['', none]
      or (
        application_autorise_raw not in ['unknown', 'unavailable', 'none', '']
        and is_state(application_autorise_entity, 'on')
      )
    }}

  fenetre_ok: >-
    {% set fenetre = fenetre_optimale_raw %}
    {% set current = current_minutes | int(0) %}
    {% set window_start = window_start_minute | int(0) %}
    {% set window_end = window_end_minute | int(0) %}
    {% set evening_start = evening_start_minute | int(1080) %}
    {% set evening_end = evening_end_minute | int(1260) %}
    {% set watering_recent = recent_watering_block | bool %}
    {% if fenetre in ['unknown', 'unavailable', 'none', '', 'attendre'] %}
      false
    {% elif fenetre_target_date not in ['', 'unknown', 'unavailable', 'none'] and today_str < fenetre_target_date %}
      false
    {% elif fenetre in ['ce_matin', 'demain_matin', 'maintenant'] %}
      {{ current >= window_start and current < window_end and not watering_recent }}
    {% elif fenetre == 'soir' %}
      {{
        watering_evening_allowed
        and current >= evening_start
        and current < evening_end
        and (etp_raw | float(0)) >= 4
        and (hum_raw | float(0)) <= 55
        and (plan_objective_mm | float(0)) > 0
        and not watering_recent
      }}
    {% elif fenetre == 'apres_pluie' %}
      {{
        not (pluie_stop | bool)
        and current >= window_start
        and current < window_end
        and not watering_recent
      }}
    {% else %}
      {{ current >= window_start and current < window_end and not watering_recent }}
    {% endif %}

condition:
  - condition: template
    value_template: "{{ (capteurs_ok | bool) and mode_gazon != 'Normal' }}"

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ mode_gazon in ['Traitement', 'Hivernage'] }}"
        sequence:
          - service: persistent_notification.create
            data:
              notification_id: gazon_intelligent_arrosage_blueprint
              title: "Gazon Intelligent: arrosage non lancé"
              message: >
                Mode {{ mode_gazon }} actif: l'arrosage automatique est volontairement bloqué.

      - conditions:
          - condition: template
            value_template: >
              {{
                trigger_is_manual
                and (plan_ok | bool)
                and (arrosage_ok | bool)
                and not (pluie_stop | bool)
                and mode_gazon not in ['Traitement', 'Hivernage', 'Normal']
                and not (recent_watering_block | bool)
              }}
        sequence:
          - service: logbook.log
            data:
              name: Gazon Intelligent
              message: >
                Lancement manuel du plan d'arrosage en mode {{ mode_gazon }} :
                {{ plan_zone_count }} zone(s),
                {{ plan_total_duration_min | round(1) }} min,
                objectif {{ plan_objective_mm | round(1) }} mm,
                {{ plan_passage_label | trim }},
                pause entre cycles={{ plan_pause_minutes }} min,
                fractionation={{ plan_fractionation }}.
                Zones: {{ plan_zones_summary | trim }}.
          - service: gazon_intelligent.start_auto_irrigation
            data:
              plan_arrosage_entity: !input sensor_plan_arrosage
              source: manual_plan

      - conditions:
          - condition: template
            value_template: >
              {{
                trigger_is_auto
                and mode_gazon in ['Sursemis', 'Fertilisation', 'Biostimulant', 'Agent Mouillant', 'Scarification']
                and (plan_ok | bool)
                and (arrosage_ok | bool)
                and not (pluie_stop | bool)
                and (application_ok | bool)
                and (fenetre_ok | bool)
                and mode_gazon not in ['Traitement', 'Hivernage']
              }}
        sequence:
          - service: logbook.log
            data:
              name: Gazon Intelligent
              message: >
                Plan d'arrosage lancé automatiquement en mode {{ mode_gazon }} :
                {{ plan_zone_count }} zone(s),
                {{ plan_total_duration_min | round(1) }} min,
                objectif {{ plan_objective_mm | round(1) }} mm,
                {{ plan_passage_label | trim }},
                pause entre cycles={{ plan_pause_minutes }} min,
                fractionation={{ plan_fractionation }}.
                Fenêtre optimale={{ fenetre_optimale_raw }}.
                Date cible={{ fenetre_target_date or 'non renseignée' }}.
                Zones: {{ plan_zones_summary | trim }}.
          - service: gazon_intelligent.start_auto_irrigation
            data:
              plan_arrosage_entity: !input sensor_plan_arrosage

      - conditions:
          - condition: template
            value_template: >
              {{
                trigger_is_manual
                and mode_gazon in ['Sursemis', 'Fertilisation', 'Biostimulant', 'Agent Mouillant', 'Scarification']
                and (plan_ok | bool)
                and (arrosage_ok | bool)
                and not (pluie_stop | bool)
                and (application_ok | bool)
                and mode_gazon not in ['Traitement', 'Hivernage', 'Normal']
                and not (recent_watering_block | bool)
              }}
        sequence:
          - service: logbook.log
            data:
              name: Gazon Intelligent
              message: >
                Lancement manuel du plan d'arrosage en mode {{ mode_gazon }} :
                {{ plan_zone_count }} zone(s),
                {{ plan_total_duration_min | round(1) }} min,
                objectif {{ plan_objective_mm | round(1) }} mm,
                {{ plan_passage_label | trim }},
                pause entre cycles={{ plan_pause_minutes }} min,
                fractionation={{ plan_fractionation }}.
                Fenêtre optimale={{ fenetre_optimale_raw }}.
                Zones: {{ plan_zones_summary | trim }}.
          - service: gazon_intelligent.start_auto_irrigation
            data:
              plan_arrosage_entity: !input sensor_plan_arrosage
              source: manual_plan

    default:
      - service: logbook.log
        data:
          name: Gazon Intelligent
          message: >
            Aucun arrosage n'a été lancé pour le trigger {{ trigger_id }}.
            Mode={{ mode_gazon }},
            fenetre_optimale={{ fenetre_optimale_raw }},
            date_cible={{ fenetre_target_date or 'non renseignée' }},
            plan_ok={{ plan_ok }},
            arrosage_ok={{ arrosage_ok }},
            pluie_stop={{ pluie_stop }},
            application_ok={{ application_ok }},
            recent_watering_block={{ recent_watering_block }},
            capteurs_ok={{ capteurs_ok }},
            objectif_plan={{ plan_objective_mm | round(1) }} mm,
            duree_plan={{ plan_total_duration_min | round(1) }} min,
            zones={{ plan_zone_count }},
            passages={{ plan_passages }},
            fractionation={{ plan_fractionation }}.
