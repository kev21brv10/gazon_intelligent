blueprint:
  name: Gazon Intelligent - Arrosage intelligent (modes spéciaux hors Normal)
  description: >
    Blueprint d'arrosage intelligent pour tous les modes sauf Normal.
    - Sursemis: fractionné en 3 passages/jour.
    - Fertilisation / Biostimulant / Agent Mouillant / Scarification: matin + soir si forte demande climatique.
    - Traitement / Hivernage: pas d'arrosage auto.
    Ajuste aussi selon pluie, ETP et humidité.
    Les entités à sélectionner ci-dessous font partie du système Gazon Intelligent (entités de l'intégration).
  domain: automation
  input:
    mode_select:
      name: Sélecteur mode gazon
      selector:
        entity:
          domain: select
    sensor_objectif:
      name: Capteur objectif d'arrosage (mm)
      selector:
        entity:
          domain: sensor
    sensor_pluie_24h:
      name: Capteur pluie 24h (mm)
      selector:
        entity:
          domain: sensor
    sensor_pluie_demain:
      name: Capteur pluie prévue demain (mm)
      selector:
        entity:
          domain: sensor
    sensor_etp:
      name: Capteur ETP estimée (mm/j)
      selector:
        entity:
          domain: sensor
    sensor_humidite:
      name: Capteur humidité extérieure (%)
      selector:
        entity:
          domain: sensor

    heure_matin:
      name: Heure matin
      default: "06:00:00"
      selector:
        time: {}
    heure_midi:
      name: Heure midi
      default: "12:30:00"
      selector:
        time: {}
    heure_soir:
      name: Heure soir
      default: "18:30:00"
      selector:
        time: {}

    seuil_pluie_stop_24h:
      name: Seuil stop pluie 24h (mm)
      default: 8
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: mm
    seuil_pluie_stop_demain:
      name: Seuil stop pluie demain (mm)
      default: 6
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: mm

mode: single

trigger:
  - platform: time
    at: !input heure_matin
    id: matin
  - platform: time
    at: !input heure_midi
    id: midi
  - platform: time
    at: !input heure_soir
    id: soir

variables:
  mode_select_entity: !input mode_select
  sensor_objectif_entity: !input sensor_objectif
  sensor_pluie_24h_entity: !input sensor_pluie_24h
  sensor_pluie_demain_entity: !input sensor_pluie_demain
  sensor_etp_entity: !input sensor_etp
  sensor_humidite_entity: !input sensor_humidite
  seuil_pluie_stop_24h_value: !input seuil_pluie_stop_24h
  seuil_pluie_stop_demain_value: !input seuil_pluie_stop_demain

  mode_gazon_raw: "{{ states(mode_select_entity) }}"
  obj_mode_raw: "{{ states(sensor_objectif_entity) }}"
  pluie24_raw: "{{ states(sensor_pluie_24h_entity) }}"
  pluie_demain_raw: "{{ states(sensor_pluie_demain_entity) }}"
  etp_raw: "{{ states(sensor_etp_entity) }}"
  hum_raw: "{{ states(sensor_humidite_entity) }}"

  mode_gazon: "{{ mode_gazon_raw }}"
  obj_mode: "{{ obj_mode_raw | float(0) }}"
  pluie24: "{{ pluie24_raw | float(0) }}"
  pluie_demain: "{{ pluie_demain_raw | float(0) }}"
  etp: "{{ etp_raw | float(0) }}"
  hum: "{{ hum_raw | float(0) }}"

  capteurs_ok: >
    {{
      mode_gazon_raw not in ['unknown', 'unavailable', 'none', '']
      and obj_mode_raw not in ['unknown', 'unavailable', 'none', '']
      and pluie24_raw not in ['unknown', 'unavailable', 'none', '']
      and pluie_demain_raw not in ['unknown', 'unavailable', 'none', '']
      and etp_raw not in ['unknown', 'unavailable', 'none', '']
      and hum_raw not in ['unknown', 'unavailable', 'none', '']
    }}

  pluie_stop: >
    {{
      pluie24 >= seuil_pluie_stop_24h_value
      or pluie_demain >= seuil_pluie_stop_demain_value
    }}

  meteo_coef: >-
    {% set c = 1.0 %}
    {% if etp >= 4 %}{% set c = c + 0.25 %}{% endif %}
    {% if hum >= 85 %}{% set c = c - 0.35 %}{% endif %}
    {% if hum <= 45 and etp >= 3 %}{% set c = c + 0.15 %}{% endif %}
    {{ [0.4, [c, 1.5] | min] | max }}

condition:
  - condition: template
    value_template: "{{ capteurs_ok and mode_gazon != 'Normal' }}"

action:
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ mode_gazon == 'Sursemis' and obj_mode > 0 and trigger.id in ['matin','midi','soir'] and not pluie_stop }}
        sequence:
          - service: gazon_intelligent.start_auto_irrigation
            data:
              objectif_mm: >
                {{ [30, [0, ((obj_mode * meteo_coef) / 3)] | max] | min | round(2) }}

      - conditions:
          - condition: template
            value_template: >
              {{
                mode_gazon in ['Fertilisation','Biostimulant','Agent Mouillant','Scarification']
                and obj_mode > 0
                and (
                  trigger.id == 'matin'
                  or (trigger.id == 'soir' and etp >= 4 and hum <= 55)
                )
                and not pluie_stop
              }}
        sequence:
          - service: gazon_intelligent.start_auto_irrigation
            data:
              objectif_mm: >
                {% if trigger.id == 'soir' %}
                  {{ [30, [0, (obj_mode * 0.6 * meteo_coef)] | max] | min | round(2) }}
                {% else %}
                  {{ [30, [0, (obj_mode * meteo_coef)] | max] | min | round(2) }}
                {% endif %}

      - conditions:
          - condition: template
            value_template: "{{ mode_gazon in ['Traitement','Hivernage'] }}"
        sequence:
          - service: persistent_notification.create
            data:
              notification_id: gazon_intelligent_arrosage_blueprint
              title: "Gazon Intelligent: arrosage non lancé"
              message: >
                Mode {{ mode_gazon }} actif: l'arrosage automatique est volontairement bloqué.

      default:
        - service: persistent_notification.create
          data:
            notification_id: gazon_intelligent_arrosage_blueprint
            title: "Gazon Intelligent: aucune action lancée"
            message: >
              Aucun arrosage n'a été lancé pour le trigger {{ trigger.id }}.
              Mode={{ mode_gazon }}, objectif={{ obj_mode | round(2) }} mm, pluie_stop={{ pluie_stop }},
              capteurs_ok={{ capteurs_ok }}.
