set_mode:
  fields:
    mode:
      required: true
      example: Sursemis
      selector:
        select:
          translation_key: gazon_mode
          options:
            - Normal
            - Sursemis
            - Traitement
            - Fertilisation
            - Biostimulant
            - Agent Mouillant
            - Scarification
            - Hivernage

set_date_action:
  fields:
    date_action:
      required: false
      example: "2026-03-12"
      selector:
        text:

reset_mode: {}

start_manual_irrigation:
  fields:
    objectif_mm:
      required: true
      example: 3
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: mm

start_auto_irrigation:
  fields:
    objectif_mm:
      required: false
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: mm
    plan_arrosage_entity:
      required: false
      selector:
        text:
    source:
      required: false
      selector:
        text: {}

start_application_irrigation: {}

declare_intervention:
  fields:
    intervention:
      required: true
      selector:
        select:
          translation_key: gazon_intervention
          options:
            - Sursemis
            - Traitement
            - Fertilisation
            - Biostimulant
            - Agent Mouillant
            - Scarification
            - Hivernage
    date_action:
      required: false
      selector:
        text:
    produit_id:
      required: false
      selector:
        text:
    produit:
      required: false
      selector:
        text:
    dose:
      required: false
      selector:
        text:
    zone:
      required: false
      selector:
        text:
    reapplication_after_days:
      required: false
      selector:
        number:
          min: 0
          max: 365
          step: 1
          unit_of_measurement: j
    application_type:
      required: false
      selector:
        select:
          options:
            - sol
            - foliaire
    application_requires_watering_after:
      required: false
      selector:
        boolean:
    application_post_watering_mm:
      required: false
      selector:
        number:
          min: 0
          max: 10
          step: 0.1
          unit_of_measurement: mm
    application_irrigation_block_hours:
      required: false
      selector:
        number:
          min: 0
          max: 72
          step: 1
          unit_of_measurement: h
    application_irrigation_delay_minutes:
      required: false
      selector:
        number:
          min: 0
          max: 1440
          step: 1
          unit_of_measurement: min
    application_irrigation_mode:
      required: false
      selector:
        select:
          options:
            - auto
            - manuel
            - suggestion
    application_label_notes:
      required: false
      selector:
        text:
    note:
      required: false
      selector:
        text:

