set_mode:
  fields:
    mode:
      required: true
      example: Sursemis
      selector:
        select:
          translation_key: gazon_mode
          options:
            - Normal
            - Sursemis
            - Traitement
            - Fertilisation
            - Biostimulant
            - Agent Mouillant
            - Scarification
            - Hivernage

set_date_action:
  fields:
    date_action:
      required: false
      example: "2026-03-12"
      selector:
        text:

reset_mode: {}

start_manual_irrigation:
  fields:
    objectif_mm:
      required: true
      example: 3
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: mm

start_auto_irrigation:
  fields:
    objectif_mm:
      required: false
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: mm
    plan_arrosage_entity:
      required: false
      selector:
        text:
    source:
      required: false
      selector:
        text: {}

start_application_irrigation: {}

declare_intervention:
  description: "Déclare une intervention réelle. Les réglages du produit se configurent dans \"Enregistrer un produit\" ; ici, il suffit de choisir le produit déjà enregistré, la date, la zone et une note si besoin. Si plusieurs produits existent et qu'aucun produit explicite n'est fourni, l'intégration utilise la sélection courante de l'UI ou renvoie une erreur claire. Quand plusieurs instances Gazon Intelligent existent, fournis aussi entity_id pour cibler la bonne instance."
  fields:
    intervention:
      required: true
      selector:
        select:
          translation_key: gazon_intervention
          options:
            - Sursemis
            - Traitement
            - Fertilisation
            - Biostimulant
            - Agent Mouillant
            - Scarification
            - Hivernage
    date_action:
      required: false
      selector:
        text:
    produit_id:
      required: false
      selector:
        text:
    produit:
      required: false
      selector:
        text:
    entity_id:
      required: false
      selector:
        entity:
          domain:
            - sensor
            - select
            - binary_sensor
            - switch
    zone:
      required: false
      selector:
        text:
    note:
      required: false
      selector:
        text:

remove_last_application:
  description: "Supprime la dernière application enregistrée dans l'historique local. Si plusieurs instances existent, fournir entity_id permet de cibler la bonne instance."
  fields:
    entity_id:
      required: false
      selector:
        entity:
          domain:
            - sensor
            - select
            - binary_sensor
            - switch

register_product:
  description: "Ajoute ou met à jour un produit personnalisé dans la base locale. La catégorie se choisit dans une liste, le dosage peut être saisi au m² et les mois d'application peuvent être précisés."
  fields:
    product_id:
      required: true
      selector:
        text:
    nom:
      required: true
      selector:
        text:
    type:
      required: true
      selector:
        select:
          translation_key: gazon_product_category
          options:
            - Traitement
            - Fertilisation
            - Biostimulant
            - Agent Mouillant
            - Scarification
            - Hivernage
    dose_conseillee:
      required: false
      example: "1.2 ml / m²"
      selector:
        text:
    reapplication_after_days:
      required: false
      selector:
        number:
          min: 0
          max: 3650
          step: 1
          unit_of_measurement: j
    delai_avant_tonte_jours:
      required: false
      selector:
        number:
          min: 0
          max: 3650
          step: 1
          unit_of_measurement: j
    phase_compatible:
      required: false
      selector:
        select:
          translation_key: gazon_phase_compatible
          multiple: true
          options:
            - Sursemis
            - Croissance
            - Entretien
    application_months:
      required: false
      selector:
        text:
    application_type:
      required: false
      selector:
        select:
          options:
            - sol
            - foliaire
    application_requires_watering_after:
      required: false
      selector:
        boolean:
    application_post_watering_mm:
      required: false
      selector:
        number:
          min: 0
          max: 10
          step: 0.1
          unit_of_measurement: mm
    application_irrigation_block_hours:
      required: false
      selector:
        number:
          min: 0
          max: 72
          step: 1
          unit_of_measurement: h
    application_irrigation_delay_minutes:
      required: false
      selector:
        number:
          min: 0
          max: 1440
          step: 1
          unit_of_measurement: min
    application_irrigation_mode:
      required: false
      selector:
        select:
          options:
            - auto
            - manuel
            - suggestion
    application_label_notes:
      required: false
      selector:
        text:
    note:
      required: false
      selector:
        text:

remove_product:
  fields:
    product_id:
      required: true
      selector:
        text:

declare_mowing:
  fields:
    date_action:
      required: false
      selector:
        text:

declare_watering:
  fields:
    date_action:
      required: false
      selector:
        text:
    objectif_mm:
      required: false
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: mm
