set_mode:
  name: Définir le mode gazon
  description: Choisit un mode (Sursemis, Traitement, etc.) et met à jour les calculs.
  fields:
    mode:
      name: Mode
      description: Mode gazon à appliquer.
      required: true
      example: Sursemis
      selector:
        select:
          options:
            - Normal
            - Sursemis
            - Traitement
            - Fertilisation
            - Biostimulant
            - Agent Mouillant
            - Scarification
            - Hivernage
            - Hivernage

set_date_action:
  name: Définir la date d'action
  description: Indique la date réelle de l'intervention (AAAA-MM-JJ). Si vide, prend la date du jour.
  fields:
    date_action:
      name: Date d'action
      description: Date de l'action au format AAAA-MM-JJ.
      required: false
      example: "2026-03-12"
      selector:
        text:

reset_mode:
  name: Repasser en mode normal
  description: Réinitialise le système gazon en mode Normal.

start_manual_irrigation:
  name: Lancer un arrosage manuel
  description: Déclenche un arrosage manuel et indique l'objectif d'eau en mm.
  fields:
    objectif_mm:
      name: Objectif d'arrosage
      description: Quantité d'eau à appliquer en millimètres.
      required: true
      example: 3
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: mm

start_auto_irrigation:
  name: Lancer l'arrosage automatique
  description: Lance chaque zone à la suite en utilisant le débit (mm/h) configuré (conversion interne en mm/min). Si l'objectif est vide, il prend l'objectif calculé automatiquement.
  fields:
    objectif_mm:
      name: Objectif d'arrosage (optionnel)
      description: Quantité d'eau en mm. Si omis, prend l'objectif calculé par le mode courant.
      required: false
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: mm

declare_intervention:
  name: Déclarer une intervention
  description: Déclare une intervention réelle (sursemis, fertilisation, etc.) pour alimenter le moteur de décision.
  fields:
    intervention:
      name: Intervention
      required: true
      selector:
        select:
          options:
            - Sursemis
            - Traitement
            - Fertilisation
            - Biostimulant
            - Agent Mouillant
            - Scarification
    date_action:
      name: Date d'action (optionnelle)
      description: Date au format AAAA-MM-JJ. Si vide, aujourd'hui.
      required: false
      selector:
        text:

declare_mowing:
  name: Déclarer une tonte
  description: Enregistre une tonte dans l'historique.
  fields:
    date_action:
      name: Date de tonte (optionnelle)
      description: Date au format AAAA-MM-JJ. Si vide, aujourd'hui.
      required: false
      selector:
        text:

declare_watering:
  name: Déclarer un arrosage
  description: Enregistre un arrosage dans l'historique.
  fields:
    date_action:
      name: Date d'arrosage (optionnelle)
      description: Date au format AAAA-MM-JJ. Si vide, aujourd'hui.
      required: false
      selector:
        text:
    objectif_mm:
      name: Quantité appliquée (optionnelle)
      description: Quantité d'eau appliquée en mm.
      required: false
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: mm
